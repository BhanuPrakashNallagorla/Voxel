kind = "web"
previewPath = "/"
title = "Voxel Occupancy Grid"
version = "1.0.0"
id = "artifacts/voxel-app"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23319

[services.development]
run = "pnpm --filter @workspace/voxel-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/voxel-app", "run", "build" ]
serve = "static"
publicDir = "artifacts/voxel-app/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23319"
BASE_PATH = "/"

[[services]]
name = "Depth API"
paths = [ "/depth" ]
localPort = 8000

[services.development]
run = "bash /home/runner/workspace/voxel-backend/start.sh"

[services.env]
PORT = "8000"
